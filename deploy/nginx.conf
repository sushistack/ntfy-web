server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths are client-side routes -> always hand back index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config and the shell must never be cached, or deploys/host changes stick.
    location = /config.js   { add_header Cache-Control "no-store"; }
    location = /index.html  { add_header Cache-Control "no-store"; }
    location = /sw.js       { add_header Cache-Control "no-store"; }

    # Hashed assets are immutable -> cache hard.
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
